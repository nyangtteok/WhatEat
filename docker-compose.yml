services:
  backend:
    build: ./backend
    container_name: whateat-backend
    ports:
      - "4000:4000"
    volumes:
      - whateat-db:/app/data
    environment:
      - PORT=4000
      - DB_PATH=/app/data/whateat.db
  frontend:
    build: ./frontend
    container_name: whateat-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
  nginx:
    image: nginx:alpine
    container_name: whateat-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
volumes:
  whateat-db:
